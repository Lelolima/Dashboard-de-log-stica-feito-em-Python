# ============================================
# Dashboard Logística - Configuração Ruff
# ============================================

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
    "ARG",   # flake8-unused-arguments
    "SIM",   # flake8-simplify
]

ignore = [
    "E501",  # line too long (Black cuide disso)
    "B008",  # do not perform function calls in argument defaults
    "B904",  # raise without from inside except clause
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__
"tests/*" = ["S101", "ARG"]  # assert, unused arguments in tests
"src/callbacks.py" = ["ARG001"]  # unused arguments em callbacks Dash

[lint.isort]
known-first-party = ["src"]
known-third-party = ["dash", "plotly", "pandas", "numpy", "pydantic"]

[lint.pydocstyle]
convention = "google"