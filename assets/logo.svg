<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="48" height="48">
  <defs>
    <!-- Gradiente Principal -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0dcaf0;stop-opacity:1" />
    </linearGradient>

    <!-- Gradiente Secundário -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#198754;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20c997;stop-opacity:1" />
    </linearGradient>

    <!-- Sombra -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" floodOpacity="0.15"/>
    </filter>
  </defs>

  <!-- Caminhão (Silhueta Simplificada) -->
  <g filter="url(#shadow)">
    <!-- Cabine -->
    <rect x="10" y="35" width="25" height="25" rx="4" fill="url(#grad1)" />

    <!-- Janela -->
    <rect x="14" y="39" width="12" height="12" rx="2" fill="#ffffff" opacity="0.9" />

    <!-- Carroceria -->
    <rect x="38" y="30" width="45" height="35" rx="4" fill="url(#grad2)" />

    <!-- Detalhe carroceria -->
    <rect x="42" y="34" width="37" height="10" rx="2" fill="#ffffff" opacity="0.3" />

    <!-- Linhas decorativas -->
    <rect x="42" y="48" width="37" height="3" rx="1.5" fill="#ffffff" opacity="0.4" />
    <rect x="42" y="54" width="25" height="3" rx="1.5" fill="#ffffff" opacity="0.4" />

    <!-- Rodas -->
    <circle cx="25" cy="64" r="7" fill="#495057" />
    <circle cx="25" cy="64" r="3" fill="#dee2e6" />
    <circle cx="55" cy="64" r="7" fill="#495057" />
    <circle cx="55" cy="64" r="3" fill="#dee2e6" />
    <circle cx="75" cy="64" r="7" fill="#495057" />
    <circle cx="75" cy="64" r="3" fill="#dee2e6" />
  </g>

  <!-- Pacote em movimento -->
  <g style="animation: truckMove 1s ease-in-out infinite;">
    <rect x="50" y="15" width="12" height="10" rx="2" fill="url(#grad1)" opacity="0.8" />
    <path d="M50 20 L62 20" stroke="#ffffff" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.6" />
  </g>

  <!-- Trajetória / Rota -->
  <path d="M5 75 Q20 65 35 75 T65 75 T95 75" stroke="#0d6efd" strokeWidth="2" fill="none" strokeDasharray="4 3" opacity="0.5" />

  <!-- Marcador de Localização -->
  <g transform="translate(82, 18)">
    <path d="M0 0 L0 -10 A4 4 0 0 1 8 -10 L8 0 Z" fill="#dc3545" opacity="0.8" />
    <circle cx="4" cy="-6" r="2.5" fill="#ffffff" />
  </g>

  <!-- Estilo inline para animação -->
  <style>
    @keyframes truckMove {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(3px); }
    }
  </style>
</svg>