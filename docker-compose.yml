version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dashboard-logistica
    ports:
      - "8050:8050"
    environment:
      - DASH_ENV=production
      - DASH_HOST=0.0.0.0
      - DASH_PORT=8050
      - DASH_DEBUG=false
      - MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data:ro
      - ./assets:/app/assets:ro
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8050/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  default:
    name: dashboard-network
    driver: bridge